spring:
  application:
    name: tokit-backend

  # Database Connection (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tokit}
    username: ${DB_USERNAME:tokit}
    password: ${DB_PASSWORD:tokit}
    driver-class-name: org.postgresql.Driver

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true

  # JPA Configurations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tokit}
    password: ${RABBITMQ_PASSWORD:tokit}

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.tokit: DEBUG
    org.hibernate.SQL: DEBUG
