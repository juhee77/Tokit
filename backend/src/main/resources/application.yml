
spring:
  application:
    name: tokit-backend

  # Database Connection (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tokit}
    username: ${DB_USERNAME:tokit}
    password: ${DB_PASSWORD:tokit}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tokit}
    user: ${DB_USERNAME:tokit}
    password: ${DB_PASSWORD:tokit}

  # JPA Configurations
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tokit}
    password: ${RABBITMQ_PASSWORD:tokit}

  # Spring Batch Configuration
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.tokit: DEBUG
    org.hibernate.SQL: DEBUG

# Custom configurations
tokit:
  blockchain:
    rpc-url: ${BLOCKCHAIN_RPC_URL:http://localhost:8545}
    contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS:0x5FbDB2315678afecb367f032d93F642f64180aa3}
    private-key: ${BLOCKCHAIN_PRIVATE_KEY:0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}

